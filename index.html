<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FestiveMetrics · ensayo Grupo 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF5EA; --paper2:#F4EBDA; --ink:#211C16; --ink2:#4A4034;
  --line:#E2D5BE; --accent:#BE4B2B; --accent2:#9A3C20;
  --ok:#2F7A56; --ok-bg:#E7F2EA; --bad:#B23A2E; --bad-bg:#F8E7E3;
  --teal:#2C6E6B; --gold:#C98A2B;
  --shadow:0 1px 0 #fff7 inset, 0 10px 30px -12px #3a2c1840; --radius:16px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Hanken Grotesk",system-ui,sans-serif;
  color:var(--ink); background:var(--paper);
  background-image:
    radial-gradient(60% 60% at 12% 0%, #ffffff55, transparent 60%),
    radial-gradient(50% 50% at 100% 100%, #f0e2c855, transparent 60%);
  background-attachment:fixed;
  line-height:1.5; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1000px;margin:0 auto;padding:22px 18px 120px}
h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:600;color:var(--ink);margin:0}
.kick{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700}
a{color:var(--accent)}
em{font-style:normal;color:var(--accent)}

/* header */
header.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
header.top h1{font-size:clamp(1.7rem,5vw,2.4rem);line-height:1.05;margin-top:4px}
header.top .sub{color:var(--ink2);font-size:.95rem;margin-top:6px;max-width:46ch}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}

/* buttons */
.btn{font-family:inherit;font-size:.92rem;font-weight:600;border-radius:12px;padding:10px 16px;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:8px;text-decoration:none;line-height:1}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(180deg,var(--accent),var(--accent2));color:#fff;box-shadow:var(--shadow)}
.btn-ghost{background:#fff8;border-color:var(--line);color:var(--ink)}
.btn-sm{padding:7px 11px;font-size:.84rem}
.btn[disabled]{opacity:.5;cursor:not-allowed}

/* cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.card{background:var(--paper2);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.pcard{cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;display:flex;flex-direction:column;gap:10px}
.pcard:hover{transform:translateY(-2px);box-shadow:0 1px 0 #fff7 inset,0 16px 36px -14px #3a2c1855}
.pcard .head{display:flex;align-items:center;gap:11px}
.dot{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#1a1a1a;font-weight:700;font-family:"Fraunces",serif;flex:0 0 auto}
.pcard .nm{font-weight:700;font-size:1.02rem;font-family:"Fraunces",serif}
.pcard .rl{color:var(--ink2);font-size:.82rem}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:.72rem;background:#fff8;border:1px solid var(--line);border-radius:999px;padding:3px 9px;color:var(--ink2)}
.stats{display:flex;gap:8px;margin-top:auto}
.stat{flex:1;border-radius:10px;padding:8px 10px;font-size:.8rem;font-weight:600;text-align:center;border:1px solid var(--line)}
.stat.ok{background:var(--ok-bg);color:var(--ok);border-color:#bfe0cc}
.stat.mid{background:#FBF0D8;color:#7A5A14;border-color:var(--gold)}
.stat.bad{background:var(--bad-bg);color:var(--bad);border-color:#eccac4}
.stat small{display:block;font-weight:500;opacity:.8;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em}

/* persona view */
.backbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.section-title{font-family:"Fraunces",serif;font-size:1.1rem;margin:26px 0 12px;display:flex;align-items:center;gap:8px}
.section-title .badge{font-family:"Hanken Grotesk";font-size:.72rem;font-weight:600;color:var(--ink2);background:#fff8;border:1px solid var(--line);border-radius:999px;padding:2px 9px}

/* flashcard */
.cards-row{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:760px){.cards-row.two{grid-template-columns:1fr 1fr}}
.flash{perspective:1400px;cursor:pointer}
.flash .inner{position:relative;transition:transform .55s;transform-style:preserve-3d;border-radius:var(--radius)}
.flash.flipped .inner{transform:rotateY(180deg)}
.flash .face{border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);backface-visibility:hidden}
.flash .back{position:absolute;inset:0;transform:rotateY(180deg);background:var(--paper2);padding:16px;display:flex;flex-direction:column}
.flash img{display:block;width:100%;height:auto}
.flash .hint{position:absolute;bottom:8px;right:10px;background:#211c16cc;color:#fff;font-size:.7rem;padding:3px 8px;border-radius:999px;backface-visibility:hidden}
.flash .back .lbl{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:700}
.flash .back h3{font-family:"Fraunces",serif;font-size:1.05rem;margin:4px 0 8px}
.flash .back .txt{font-size:.94rem;color:var(--ink);overflow:auto}
.flash .back .mine{margin-top:auto;font-size:.72rem;color:var(--ink2);font-style:italic;padding-top:8px}

/* slide card (móvil-first): imagen + Ver guion + acordeón */
.slidecard{background:var(--paper2);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.slidewrap{position:relative;cursor:zoom-in;line-height:0}
.slideimg{display:block;width:100%;height:auto}
.zoomhint{position:absolute;bottom:8px;right:8px;background:#211c16cc;color:#fff;font-size:.7rem;padding:4px 9px;border-radius:999px;line-height:1.2}
.guion-toggle{width:100%;border-radius:0;border:0;border-top:1px solid var(--line);background:#fff8;justify-content:center;padding:13px;font-size:.95rem}
.guion-toggle.on{background:var(--paper)}
.guion-panel{padding:14px 16px;border-top:1px solid var(--line)}
.guion-panel .lbl{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:700}
.guion-panel h3{font-family:"Fraunces",serif;font-size:1.05rem;margin:4px 0 8px}
.guion-panel .txt{font-size:1rem;line-height:1.6;color:var(--ink)}
.guion-panel .mine{margin-top:10px;font-size:.74rem;color:var(--ink2);font-style:italic}

/* lightbox para ampliar la diapo */
.zoom-ov{position:fixed;inset:0;z-index:70;background:#120d08ee;display:flex;align-items:center;justify-content:center;padding:10px;overflow:auto;cursor:zoom-out}
.zoom-ov img{max-width:100%;width:1200px;height:auto;border-radius:8px;box-shadow:0 20px 60px -20px #000}
.zoom-close{position:fixed;top:14px;right:16px;color:#fff;background:#0006;border:1px solid #fff4;padding:6px 12px;border-radius:999px;font-size:.85rem}

/* audio */
.audio-wrap{margin:2px 0 10px}
.audio-wrap audio{width:100%;height:42px;display:block}
.btn-rec{background:linear-gradient(180deg,#cf4a36,#a8331f);color:#fff;box-shadow:var(--shadow);font-weight:700;width:100%;justify-content:center;padding:13px 16px;border-radius:12px;font-size:.95rem}
.btn-rec .recdot{background:#fff}
.slot .choose{margin:2px 0 10px}
.slot .ops{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.slot .ops .btn-sm{flex:1 1 auto;justify-content:center;min-width:120px;padding:11px 12px}

/* audio */
.audio-slots{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:620px){.audio-slots{grid-template-columns:1fr 1fr}}
.slot{border:1px solid var(--line);border-radius:14px;background:#fff8;padding:14px}
.slot.empty{border-style:dashed}
.slot .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.slot .sh b{font-family:"Fraunces",serif;font-size:.98rem}
.slot audio{width:100%;margin:6px 0}
.slot .ops{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.choose{display:flex;align-items:center;gap:7px;font-size:.84rem;color:var(--ink2);cursor:pointer;user-select:none}
.choose input{accent-color:var(--accent)}
.pin{font-size:.78rem;color:var(--teal);font-weight:600}
.hiddenfile{display:none}
.recdot{width:9px;height:9px;border-radius:50%;background:var(--bad);display:inline-block;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.25}}

/* test */
.qwrap{max-width:680px;margin:0 auto}
.progressline{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 20px}
.progressline > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .3s}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff8;border-radius:12px;padding:13px 15px;margin-bottom:10px;font-family:inherit;font-size:.96rem;cursor:pointer;color:var(--ink)}
.opt:hover{border-color:var(--accent)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);font-weight:600}
.opt.wrong{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
.opt[disabled]{cursor:default}
.expl{background:var(--paper2);border:1px solid var(--line);border-left:4px solid var(--teal);border-radius:10px;padding:11px 13px;font-size:.9rem;margin:6px 0 4px;color:var(--ink2)}
.qnav{position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--paper) 24%);padding:14px 0 18px;margin-top:14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.score-big{font-family:"Fraunces",serif;font-size:3rem;color:var(--accent);line-height:1}

/* presentation */
.pres-overlay{position:fixed;inset:0;background:#161009f2;z-index:50;display:flex;flex-direction:column;color:#f4ecdd;padding:14px}
.pres-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
.pres-top .who{font-family:"Fraunces",serif;font-size:1.05rem}
.pres-top .who small{display:block;color:#c9bca6;font-family:"Hanken Grotesk";font-size:.78rem;font-weight:500}
.pres-stage{flex:1;display:grid;place-items:center;min-height:0}
.pres-stage img{max-width:100%;max-height:100%;border-radius:12px;box-shadow:0 20px 60px -20px #000a}
.pres-bar{height:6px;background:#ffffff22;border-radius:999px;overflow:hidden;margin:12px 0}
.pres-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--accent))}
.pres-ctrls{display:flex;justify-content:center;align-items:center;gap:10px}
.pres-ctrls .btn-ghost{background:#ffffff14;border-color:#ffffff33;color:#f4ecdd}
.pres-warn{color:#f4c430;font-size:.82rem;text-align:center;margin-top:6px;min-height:1em}

/* modal */
.modal-bg{position:fixed;inset:0;background:#211c1688;z-index:40;display:grid;place-items:center;padding:18px}
.modal{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 30px 80px -20px #000a;max-width:640px;width:100%;max-height:86vh;overflow:auto;padding:22px}
.tbl{width:100%;border-collapse:collapse;font-size:.9rem}
.tbl th,.tbl td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
.tbl th{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2)}
.pill{font-size:.74rem;font-weight:600;padding:2px 8px;border-radius:999px}
.pill.ok{background:var(--ok-bg);color:var(--ok)}
.pill.bad{background:var(--bad-bg);color:var(--bad)}

/* banner */
.banner{border-radius:12px;padding:11px 14px;font-size:.86rem;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.banner.warn{background:#fbf0d8;border:1px solid var(--gold);color:#7a5a14}
.banner.live{background:var(--ok-bg);border:1px solid #bfe0cc;color:var(--ok)}
.banner b{font-weight:700}
.muted{color:var(--ink2)}
.center{text-align:center}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#211c16;color:#fbf5ea;padding:10px 18px;border-radius:999px;font-size:.88rem;z-index:80;box-shadow:0 12px 30px -10px #0008}
@media(max-width:560px){
  .top-actions{width:100%}
  .top-actions .btn{flex:1;justify-content:center}
}

</style>
</head>

s dolores concretos: visibilidad nula —no se sabe cuánta gente ni cuánto personal hay en cada zona—, reacción tardía —los déficits se ven cuando ya hay colas o incidentes— y sin datos del turno, porque las horas se calculan a mano, tarde y con errores."}], "antonio": [{"slide": 3, "titulo": "La solución", "texto": "La solución son tres capas conectadas. Uno: la pulsera NFC, un lector PN532 sobre un ESP32 que, al acercar la pulsera, manda su UID. Dos: la API en Laravel; POST barra api barra fichar valida el token y abre o cierra el turno. Tres: el dashboard, con mapa de calor, déficits y mensajería en tiempo real. El stack real de la demo: Laravel 13, PHP 8.3, SQLite, Blade más Tailwind, firmware ESP-IDF y hora Europe/Madrid."}, {"slide": 4, "titulo": "Zonas · mapa de calor", "texto": "Aquí arranca la historia: el recinto en un mapa de calor con semáforo. Diecinueve zonas, cada una con su tipo, su aforo y las personas deseadas. Verde, todo bien; ámbar, precaución, zona que requiere atención; rojo, situación crítica, actuar ya. El color lo dice todo sin necesidad de explicación."}], "alberto": [{"slide": 5, "titulo": "Parametrización", "texto": "Este es el punto clave: las recomendaciones no están escritas a fuego, se calculan con reglas configurables. La regla actual es un trabajador por cada 50 metros cuadrados más uno por cada 100 clientes, con un mínimo de uno. Los umbrales —los 50 metros, los 100 clientes— los edita el administrador. Si la regla no se cumple, salta el aviso de déficit. A la derecha comparamos personal recomendado contra personal actual, zona por zona."}, {"slide": 6, "titulo": "Panel · recomendación", "texto": "En el panel pinchas una zona y recibes la recomendación. Por ejemplo la Zona F: aforo 120, 240 personas, tres camareros actuales frente a ocho recomendados, en rojo. El sistema dice: faltan cinco camareros, cógelos de la Barra M o de la Barra Tesoro, que están sobradas. El criterio es cercanía entre zonas más balance de personal. Un clic en Aceptar y reasignar y se genera el mensaje automático al personal."}], "andres": [{"slide": 7, "titulo": "Demo en vivo", "texto": "Os enseñamos el ciclo completo en directo, paso a paso. Uno: llega un turno y varios trabajadores fichan con la pulsera. Dos: salta el déficit, la Zona F se pone en rojo porque faltan camareros. Tres: aviso al admin, el panel propone mover personal desde las barras sobradas. Cuatro: reasignación, un clic mueve al trabajador y avisa por mensajería. Cinco: zona estabilizada, la Zona F vuelve a verde en el mapa."}], "wentao": [{"slide": 8, "titulo": "Fichaje NFC por dentro", "texto": "Bajo el capó: cómo un toque se convierte en fichaje. La pulsera no decide nada, solo manda su UID; toda la lógica vive en la API. La petición es POST barra api barra fichar con el UID y un token compartido. Si el UID es conocido, alterna el turno: si hay uno abierto lo cierra y calcula las horas, y si no, abre uno nuevo. Tres detalles: el token de cada petición se valida contra el del firmware —sin token no hay fichaje—, los timestamps se sellan con hora Europe/Madrid, y un UID desconocido se cachea 30 segundos para autocompletar el alta del trabajador."}], "victoria": [{"slide": 9, "titulo": "Mensajería e incidencias", "texto": "Coordinación en los dos sentidos. La dirección manda órdenes y cualquier usuario reporta lo que ve. La mensajería a empleados tiene tres modos: individual a un trabajador concreto, por grupo o zona a todo un rol o a los de una zona, y contextual, con respuestas según rol, zona y ocupación. Las incidencias son de reporte abierto: cualquier usuario registrado las envía desde su interfaz, tienen estado pendiente o resuelta con conteo en el reporte, y el admin lo ve todo en un panel único en tiempo real."}], "sergio": [{"slide": 10, "titulo": "Estadísticas del día", "texto": "Al cerrar la jornada, todo lo que pasó se resume en datos. Horas trabajadas por empleado, calculadas desde el fichaje. Recorrido: en qué zonas estuvo cada trabajador. Y eficacia por hora: los ingresos de la zona divididos entre los trabajadores activos; por ejemplo, cinco trabajadores que ingresan 100 euros en una hora son 20 euros por trabajador y hora. Además el ratio empleado a cliente, como uno a cuarenta, que se puede ordenar y comparar por zona y por persona."}, {"slide": 11, "titulo": "Mantenimiento", "texto": "Está pensado para aguantar el día del festival: ocho casuísticas documentadas con síntomas, causas y plan de acción, más un protocolo de escalado. Las críticas son espacio en disco, caída del backend, pérdida de datos y brecha de seguridad. Y el escalado por gravedad: P1 crítico en menos de 30 minutos, P2 alto en menos de 2 horas, P3 medio en menos de 8 horas y P4 bajo en menos de 72."}]}, "tests": {"raul": [{"q": "¿Cuál es la frase de venta del proyecto?", "o": ["«Una pulsera, una API y un panel que decide contigo.»", "«El festival en la palma de tu mano.»", "«Datos en tiempo real para todos.»", "«NFC para gobernarlos a todos.»"], "c": 0, "e": "Es la frase gancho oficial del dossier."}, {"q": "Los tres dolores del problema son…", "o": ["Visibilidad nula, reacción tardía y sin datos del turno", "Falta de personal, falta de presupuesto y falta de tiempo", "Colas, ruido y seguridad", "Aforo, accesos y barras"], "c": 0, "e": "Visibilidad nula / reacción tardía / sin datos fiables del turno."}, {"q": "TRAMPA: ¿sobre qué base de datos corre la DEMO?", "o": ["SQLite", "Oracle", "MySQL", "PostgreSQL"], "c": 0, "e": "La demo corre en SQLite; Oracle solo aparece en el plan de mantenimiento como producción."}, {"q": "El plan menciona Oracle pero la demo usa SQLite. ¿Cómo se defiende?", "o": ["SQLite en la demo; Oracle previsto en producción y la migración es directa porque Eloquent abstrae el motor", "Es un error del documento, ignoradlo", "Usamos las dos a la vez", "Migramos a Oracle ayer mismo"], "c": 0, "e": "Postura única del grupo (sección 3.6 del dossier)."}, {"q": "¿Qué volumen maneja la demo?", "o": ["19 zonas y 200+ trabajadores", "5 zonas y 50 trabajadores", "30 zonas y 1000 trabajadores", "Solo datos de ejemplo, sin cifras"], "c": 0, "e": "19 zonas con posición en el plano y 200+ trabajadores."}, {"q": "El stack REAL de la demo es…", "o": ["Laravel 13 · PHP 8.3 · SQLite · Blade+Tailwind · ESP32+PN532", "Node.js · React · MongoDB · Arduino", "Django · Vue · MySQL · Raspberry Pi", "Spring · Angular · Oracle · Arduino"], "c": 0, "e": "El de la diapo 3, no el del plan de mantenimiento."}], "antonio": [{"q": "Las tres capas de la solución son…", "o": ["Pulsera NFC (ESP32+PN532) → API Laravel → Dashboard", "Sensor → Excel → Email", "App móvil → Servidor → SMS", "QR → Web → WhatsApp"], "c": 0, "e": "Hardware, integración/API y software (dashboard)."}, {"q": "¿Qué componente lee físicamente la NFC?", "o": ["El lector PN532", "El ESP32", "El UID", "Laravel"], "c": 0, "e": "PN532 es el chip lector; el ESP32 envía el UID por HTTP."}, {"q": "En el semáforo, ámbar significa…", "o": ["Precaución: zona que requiere atención", "Todo bien, sin incidencias", "Situación crítica, actuar ya", "Zona cerrada"], "c": 0, "e": "Verde OK · ámbar precaución · rojo crítico."}, {"q": "¿Cuántas zonas tiene el recinto?", "o": ["19", "13", "7", "200"], "c": 0, "e": "19 zonas con tipo, aforo y personas deseadas."}, {"q": "¿Por qué NFC y no QR o huella? (pregunta del tribunal)", "o": ["Instantáneo, barato, robusto en exterior y sin biometría sensible", "Porque es lo más moderno", "Porque el QR no funciona de noche", "Porque la huella es ilegal"], "c": 0, "e": "Un toque, no depende de smartphone ni cobertura; no guarda biometría."}, {"q": "¿En qué zona horaria se sellan los timestamps?", "o": ["Europe/Madrid", "UTC", "Hora del navegador del trabajador", "No se guarda la hora"], "c": 0, "e": "Siempre hora local Europe/Madrid."}], "alberto": [{"q": "La fórmula de personal recomendado es…", "o": ["max(1, floor(m²/50) + floor(clientes/100))", "m² × clientes / 100", "1 trabajador por zona, fijo", "clientes / trabajadores"], "c": 0, "e": "1 por 50 m² + 1 por 100 clientes, mínimo 1."}, {"q": "¿Quién define los umbrales (50 m², 100 clientes)?", "o": ["El administrador (parametrización)", "Están fijos en el código", "El propio trabajador", "Se calculan solos por IA"], "c": 0, "e": "Son configurables por el admin — fue el punto clave que pidió Llopis."}, {"q": "Zona de 320 m² con 250 clientes: ¿personal recomendado?", "o": ["8", "6", "2", "10"], "c": 0, "e": "floor(320/50)=6, floor(250/100)=2 → 6+2 = 8."}, {"q": "En el panel, la Zona F muestra…", "o": ["3 camareros actuales frente a 8 recomendados (en rojo)", "8 actuales y 3 recomendados", "Todo en verde", "No tiene datos"], "c": 0, "e": "Déficit de 5 → salta la recomendación."}, {"q": "¿Con qué criterio recomienda mover gente entre zonas?", "o": ["Cercanía entre zonas + balance de personal", "Orden alfabético", "Antigüedad del trabajador", "Al azar"], "c": 0, "e": "No manda a alguien al otro extremo del recinto."}, {"q": "Al pulsar «Aceptar y reasignar»…", "o": ["Mueve al trabajador y genera un mensaje automático al personal", "Solo cambia el color de la zona", "Borra el déficit sin avisar", "Cierra la app"], "c": 0, "e": "Reasigna y notifica por mensajería."}], "andres": [{"q": "Orden correcto de los 5 pasos de la demo:", "o": ["Llega turno → salta déficit → aviso admin → reasignación → zona estabilizada", "Déficit → turno → reasignación → aviso → verde", "Aviso → reasignación → turno → déficit → verde", "Turno → aviso → verde → déficit → reasignación"], "c": 0, "e": "Es el arco dramático de la diapo 7."}, {"q": "¿Qué dispara que la Zona F se ponga en rojo?", "o": ["El personal actual cae por debajo del recomendado", "Que hay demasiados camareros", "Que se acaba la batería de la pulsera", "Un fallo de la API"], "c": 0, "e": "Déficit = actual < recomendado."}, {"q": "Tras reasignar con un clic, ¿qué ocurre además del movimiento?", "o": ["Se genera un mensaje automático al trabajador", "Nada más", "Se reinicia el servidor", "Se borra el fichaje"], "c": 0, "e": "Reasignación + mensaje automático."}, {"q": "Estado final de la Zona F tras estabilizarse:", "o": ["Verde", "Ámbar", "Rojo", "Gris"], "c": 0, "e": "Vuelve a verde en el mapa de calor."}, {"q": "Si en la demo falla la conexión o el proyector, el plan B es…", "o": ["Tener la web ya abierta y logueada + capturas de respaldo", "Improvisar", "Cancelar la demo", "Reiniciar el portátil"], "c": 0, "e": "Web abierta como admin@festivemetrics.com y plan B con capturas."}], "wentao": [{"q": "¿Qué envía exactamente la pulsera al fichar?", "o": ["Solo su UID (no decide nada)", "El UID y las horas trabajadas", "La zona y el rol", "Una orden de cierre de turno"], "c": 0, "e": "La pulsera solo manda el UID; la lógica vive en la API."}, {"q": "El cuerpo de POST /api/fichar es…", "o": ["{ uid, token }", "{ usuario, contraseña }", "{ zona, horas }", "{ uid solamente }"], "c": 0, "e": "UID + token compartido."}, {"q": "UID conocido con un turno YA abierto → ¿qué pasa?", "o": ["Se cierra el turno y se calculan las horas (toggle)", "Abre un segundo turno", "Da error", "Borra al trabajador"], "c": 0, "e": "Funciona por toggle: mismo gesto abre o cierra."}, {"q": "¿Qué se hace con un UID desconocido?", "o": ["Se cachea 30 s para autocompletar el alta del trabajador", "Se rechaza y se ignora", "Se da de alta automáticamente", "Se bloquea la pulsera"], "c": 0, "e": "GET /api/ultimo-uid-desconocido lo ofrece como autocompletar."}, {"q": "TRAMPA: el documento habla de Arduino y un puente Python. ¿Qué corre de verdad?", "o": ["Un ESP32 con ESP-IDF que hace HTTP directo; Arduino+puente fue prototipo previo", "Arduino con un script Python como puente", "Una Raspberry Pi", "No hay hardware, todo es simulado"], "c": 0, "e": "Evolucionamos a ESP32 HTTP directo, quitando el intermediario."}, {"q": "¿Cómo se autentica cada fichaje en el servidor?", "o": ["Con un token compartido; sin token válido no se ficha", "Con usuario y contraseña del trabajador", "Con la huella", "No se autentica"], "c": 0, "e": "El token del firmware se valida en cada petición."}], "victoria": [{"q": "Los modos de mensajería a empleados son…", "o": ["Individual, por grupo/zona y contextual", "Solo email", "Solo por megafonía", "Individual y pública únicamente"], "c": 0, "e": "Individual, por grupo/zona y contextual (según rol, zona y ocupación)."}, {"q": "¿Quién puede enviar incidencias?", "o": ["Cualquier usuario registrado, desde su interfaz", "Solo el administrador", "Solo seguridad", "Nadie, son automáticas"], "c": 0, "e": "Reporte abierto a cualquier usuario registrado."}, {"q": "Los estados de una incidencia son…", "o": ["Pendiente / resuelta", "Abierta / cerrada / archivada", "Baja / media / alta", "Verde / ámbar / rojo"], "c": 0, "e": "Pendiente o resuelta, con conteo en el reporte."}, {"q": "«Contextual» en la mensajería significa…", "o": ["Respuestas según rol, zona y nivel de ocupación", "Mensajes con emojis", "Traducción automática", "Mensajes que se autodestruyen"], "c": 0, "e": "Se adapta al rol, la zona y la ocupación."}, {"q": "¿Dónde concentra el admin avisos y eventos?", "o": ["En un panel único, en tiempo real", "En su correo", "En un grupo de WhatsApp", "En un PDF al final del día"], "c": 0, "e": "Panel único que alimenta todo el sistema."}], "sergio": [{"q": "La eficacia por hora se calcula como…", "o": ["Ingresos de la zona ÷ nº de trabajadores activos", "Trabajadores ÷ ingresos", "Horas × ingresos", "Clientes ÷ trabajadores"], "c": 0, "e": "Ingresos / trabajadores activos en ese periodo."}, {"q": "5 trabajadores ingresan 100 € en una hora. Eficacia:", "o": ["20 €/trabajador-hora", "500 €/trabajador-hora", "100 €/trabajador-hora", "5 €/trabajador-hora"], "c": 0, "e": "100 / 5 = 20. Es el ejemplo canónico del profesor."}, {"q": "4 trabajadores ingresan 240 € en una hora. Eficacia:", "o": ["60 €/trabajador-hora", "40 €/trabajador-hora", "240 €/trabajador-hora", "96 €/trabajador-hora"], "c": 0, "e": "240 / 4 = 60."}, {"q": "Las horas t <script>
/* FestiveMetrics · herramienta de ensayo (Grupo 5) */
const DATA = JSON.parse(document.getElementById('data').textContent);
const { people, slides, guiones, tests, config } = DATA;
const REQ_T = config.requiredTests, REQ_A = config.requiredAudios, BUCKET = config.bucket;
const byId = id => people.find(p => p.id === id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const app = () => document.getElementById('app');

/* ============ SUPABASE — RELLENA ESTAS DOS LÍNEAS (las dos del MISMO proyecto) ============ */
const SUPA_URL = "https://rgijibdabaoqkthspsoq.supabase.co";   // ej.: https://abcdxyz.supabase.co
const SUPA_KEY = "sb_publishable_uB0I4QKXV0hwJhqdV3HLVQ_4t4yzFfH";       // Publishable key (sb_publishable_...) del MISMO proyecto. Settings -> API Keys.
/* ========================================================================================= */

function sbReady(){ return /^https:\/\/[^ ]+\.supabase\.co/.test(SUPA_URL) && SUPA_KEY.length > 20 && SUPA_KEY.indexOf("PEGA_AQUI") === -1; }
function sbHeaders(extra){ return Object.assign({ apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY }, extra || {}); }
function pubUrl(path){ return SUPA_URL + "/storage/v1/object/public/" + BUCKET + "/" + path; }

/* ---- state ---- */
let state = { view:"home", personId:null, counts:{}, audios:{}, online:false, loaded:false };
people.forEach(p => { state.counts[p.id] = 0; state.audios[p.id] = {}; });
let testState = null, pres = null, recState = {};

function lsGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
function lsSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }

/* ---- remote ---- */
function keyKind(){
  if(SUPA_KEY.indexOf("sb_publishable_") === 0) return "publishable";
  if(SUPA_KEY.indexOf("sb_secret_") === 0) return "secret";
  if(SUPA_KEY.indexOf("eyJ") === 0) return "jwt-legacy";
  return "desconocida";
}
function classifyError(status, text){
  text = text || "";
  if(/42501|permission denied|insufficient.privilege|Grant the required privileges/i.test(text)) return "grants";
  if(/Bucket not found/i.test(text)) return "bucket";
  if(/JWS|Compact JWS|Unauthorized|invalid.*jwt|jwt.*invalid|No API key|Invalid authentication/i.test(text)) return "key";
  if(/does not exist|could not find the table|schema cache|relation .* does not exist/i.test(text) || status === 404) return "tables";
  if(status === 0) return "net";
  if(status === 401 || status === 403) return "key";
  return "other";
}
async function loadRemote(){
  state.loaded = false; state.diag = null;
  if(!sbReady()){ state.online = false; state.loaded = true; return; }
  let tr, au;
  try{
    tr = await fetch(SUPA_URL + "/rest/v1/fm_test_resultado?select=persona_id", { headers: sbHeaders() });
    au = await fetch(SUPA_URL + "/rest/v1/fm_audio?select=*", { headers: sbHeaders() });
  }catch(e){ state.online = false; state.diag = { reason:"net" }; state.loaded = true; return; }
  people.forEach(p => { state.counts[p.id] = 0; state.audios[p.id] = {}; });
  const trj = tr.ok ? await tr.json() : null;
  const auj = au.ok ? await au.json() : null;
  if(Array.isArray(trj)) trj.forEach(r => { if(state.counts[r.persona_id] != null) state.counts[r.persona_id]++; });
  if(Array.isArray(auj)) auj.forEach(r => { if(state.audios[r.persona_id]) state.audios[r.persona_id][String(r.slot)] = { url:r.url, path:r.path, es:!!r.es_presentacion }; });
  state.online = tr.ok && au.ok && Array.isArray(auj);
  if(!state.online){
    const bad = !au.ok ? au : tr;
    let t = ""; try { t = await bad.text(); } catch(e){}
    state.diag = { reason: classifyError(bad.status, t) };
  }
  state.loaded = true;
}

async function saveTest(pid, aciertos, total){
  state.counts[pid] = (state.counts[pid] || 0) + 1;
  if(!sbReady()) return false;
  try{
    await fetch(SUPA_URL + "/rest/v1/fm_test_resultado", {
      method:"POST",
      headers: sbHeaders({ "Content-Type":"application/json", "Prefer":"return=minimal" }),
      body: JSON.stringify({ persona_id:pid, aciertos:aciertos, total:total, porcentaje:Math.round(aciertos/total*100) })
    });
    return true;
  }catch(e){ return false; }
}

function extFor(mime){
  mime = mime || "";
  if(mime.indexOf("mpeg")>=0) return "mp3";
  if(mime.indexOf("mp4")>=0 || mime.indexOf("m4a")>=0 || mime.indexOf("aac")>=0) return "m4a";
  if(mime.indexOf("wav")>=0) return "wav";
  if(mime.indexOf("webm")>=0) return "webm";
  if(mime.indexOf("ogg")>=0) return "ogg";
  return "audio";
}

async function uploadAudio(pid, slot, blob, mime){
  if(!sbReady()){ toast("Pega tu URL y Publishable key de Supabase para publicar audios."); return false; }
  const path = pid + "/slot" + slot + "." + extFor(mime);
  try{
    const up = await fetch(SUPA_URL + "/storage/v1/object/" + BUCKET + "/" + path, {
      method:"POST",
      headers: sbHeaders({ "Content-Type": mime || "application/octet-stream", "x-upsert":"true" }),
      body: blob
    });
    if(!up.ok){
      const t = await up.text();
      const k = classifyError(up.status, t);
      if(k === "key") toast("Clave inválida: usa la Publishable key (sb_publishable_…) del MISMO proyecto que la URL.");
      else if(k === "bucket") toast("Falta el bucket fm-audios: ejecuta el SQL en Supabase.");
      else toast("Error al subir (storage): " + t.slice(0,120));
      return false;
    }
    const url = pubUrl(path);
    const db = await fetch(SUPA_URL + "/rest/v1/fm_audio?on_conflict=persona_id,slot", {
      method:"POST",
      headers: sbHeaders({ "Content-Type":"application/json", "Prefer":"resolution=merge-duplicates,return=minimal" }),
      body: JSON.stringify({ persona_id:pid, slot:slot, url:url, path:path })
    });
    const prev = state.audios[pid][String(slot)] || {};
    if(!db.ok){
      const t = await db.text();
      const k = classifyError(db.status, t);
      // el archivo SÍ está en el bucket; reflejamos en memoria para que se oiga ahora, pero avisamos de que NO se guardó.
      state.audios[pid][String(slot)] = { url: url + "?t=" + Date.now(), path:path, es: !!prev.es, unsaved:true };
      if(k === "grants") toast("Audio subido, PERO no se guarda: faltan permisos (error 42501). Re-ejecuta el SQL actualizado.");
      else if(k === "tables") toast("Audio subido, PERO no se guarda: falta la tabla fm_audio. Ejecuta el SQL → Probar conexión.");
      else if(k === "key") toast("Audio subido, pero el dato no se guardó: clave inválida (usa la Publishable key).");
      else toast("Audio subido, pero no se guardó el registro: " + t.slice(0,120));
      return false;
    }
    state.audios[pid][String(slot)] = { url: url + "?t=" + Date.now(), path:path, es: !!prev.es };
    return true;
  }catch(e){ toast("Error de red al subir: " + (e.message || e)); return false; }
}

async function setPresentation(pid, slot){
  Object.keys(state.audios[pid]).forEach(s => { state.audios[pid][s].es = (s === String(slot)); });
  if(!sbReady()) return;
  try{
    await fetch(SUPA_URL + "/rest/v1/fm_audio?persona_id=eq." + pid, {
      method:"PATCH", headers: sbHeaders({ "Content-Type":"application/json", "Prefer":"return=minimal" }),
      body: JSON.stringify({ es_presentacion:false }) });
    await fetch(SUPA_URL + "/rest/v1/fm_audio?persona_id=eq." + pid + "&slot=eq." + slot, {
      method:"PATCH", headers: sbHeaders({ "Content-Type":"application/json", "Prefer":"return=minimal" }),
      body: JSON.stringify({ es_presentacion:true }) });
  }catch(e){}
}

function audioCount(pid){ const a = state.audios[pid] || {}; return (a["1"]?1:0) + (a["2"]?1:0); }
function chosenAudio(pid){
  const a = state.audios[pid] || {};
  if(a["1"] && a["1"].es) return a["1"];
  if(a["2"] && a["2"].es) return a["2"];
  return a["1"] || a["2"] || null;
}

/* ---- toast ---- */
function toast(msg){
  const t = document.createElement('div'); t.className='toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(()=>{ t.remove(); }, 2800);
}

/* ---- views ---- */
function render(){
  if(state.view === "test") return renderTest();
  if(state.view === "persona") return renderPersona();
  return renderHome();
}

function statBox(value, req, label){
  const cls = value >= req ? "ok" : (value > 0 ? "mid" : "bad");
  return '<div class="stat ' + cls + '"><small>' + label + '</small>' + value + ' / ' + req + (value>=req?' ✓':'') + '</div>';

function startTest(pid){
  testState = { pid:pid, qs:(tests[pid]||[]).slice(), idx:0, picked:null, score:0, finished:false };
  state.view = "test"; state.personId = pid; render();
}
function answer(i){
  if(!testState || testState.picked != null) return;
  testState.picked = i;
  if(i === testState.qs[testState.idx].c) testState.score++;
  render();
}
async function nextQ(){
  if(!testState || testState.picked == null) return;
  if(testState.idx + 1 >= testState.qs.length){
    testState.finished = true;
    render();
    await saveTest(testState.pid, testState.score, testState.qs.length);
    render();
  }else{
    testState.idx++; testState.picked = null; render();
  }
}
function renderTest(){
  const ts = testState, p = byId(ts.pid);
  if(ts.finished){
    const total = ts.qs.length, pct = Math.round(ts.score/total*100), tc = state.counts[ts.pid] || 0;
    app().innerHTML = ''
      + '<div class="wrap"><div class="qwrap center">'
      +  '<div class="kick">' + esc(p.nombre) + '</div>'
      +  '<div class="score-big">' + ts.score + '/' + total + '</div>'
      +  '<p style="font-size:1.1rem;font-family:Fraunces,serif">' + (pct>=80 ? '¡Listo para el tribunal!' : pct>=50 ? 'Bien, pero repasa los fallos.' : 'A repasar el guion.') + '</p>'
      +  '<p class="muted">Test contabilizado. Llevas <b>' + tc + ' / ' + REQ_T + '</b>.</p>'
      +  '<div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">'
      +    '<button class="btn btn-primary" onclick="startTest(\'' + ts.pid + '\')">↻ Repetir</button>'
      +    '<button class="btn btn-ghost" onclick="openPersona(\'' + ts.pid + '\')">← Volver a ' + esc(p.nombre.split(' ')[0]) + '</button>'
      +  '</div></div></div>';
    return;
  }
  const q = ts.qs[ts.idx], picked = ts.picked;
  const opts = q.o.map((o,i) => {
    let cls = "opt";
    if(picked != null){
      if(i === q.c) cls += " correct";
      else if(i === picked) cls += " wrong";
    }
    return '<button class="' + cls + '" ' + (picked!=null?'disabled':'') + ' onclick="answer(' + i + ')">' + esc(o) + '</button>';
  }).join('');
  app().innerHTML = ''
    + '<div class="wrap"><div class="qwrap">'
    +  '<div class="backbar"><button class="btn btn-ghost btn-sm" onclick="openPersona(\'' + ts.pid + '\')">✕ Salir</button>'
    +    '<span class="tag">' + esc(p.nombre.split(' ')[0]) + ' · pregunta ' + (ts.idx+1) + ' / ' + ts.qs.length + '</span></div>'
    +  '<div class="progressline"><i style="width:' + (ts.idx/ts.qs.length*100) + '%"></i></div>'
    +  '<h2 style="font-size:1.25rem;margin-bottom:16px">' + esc(q.q) + '</h2>'
    +  opts
    +  (picked != null ? '<div class="expl"><b>' + (picked===q.c?'✓ Correcto. ':'✗ ') + '</b>' + esc(q.e) + '</div>' : '')
    +  '<div class="qnav"><span class="muted">Aciertos: ' + ts.score + '</span>'
    +    '<button class="btn btn-primary" ' + (picked==null?'disabled':'') + ' onclick="nextQ()">' + (ts.idx+1>=ts.qs.length ? 'Ver resultado' : 'Siguiente →') + '</button></div>'
    + '</div></div>';
}

function triggerUpload(pid, slot){

  inp.type = 'file'; inp.accept = 'audio/*'; inp.className = 'hiddenfile';
  inp.onchange = async () => {
    const f = inp.files && inp.files[0]; if(!f) return;
    toast("Subiendo audio…");
    const ok = await uploadAudio(pid, slot, f, f.type);
    if(ok){ toast("Audio publicado ✓"); if(state.view==="persona") renderPersona(); }
  };
  document.body.appendChild(inp); inp.click(); setTimeout(()=>inp.remove(), 60000);
}
function fmtClock(s){ const m = Math.floor(s/60), ss = s%60; return m + ":" + (ss<10?"0":"") + ss; }
async function toggleRecord(pid, slot){
  const key = pid + "-" + slot;
  if(recState[key] && recState[key].rec && recState[key].rec.state === "recording"){ recState[key].rec.stop(); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === "undefined"){
    toast("Este navegador no permite grabar aquí; usa “Subir audio”."); return;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    const rec = new MediaRecorder(stream); const chunks = [];
    rec.ondataavailable = e => { if(e.data && e.data.size) chunks.push(e.data); };
    rec.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      if(recState[key] && recState[key].timer) clearInterval(recState[key].timer);
      const blob = new Blob(chunks, { type: rec.mimeType || 'audio/webm' });
      recState[key] = null;
      toast("Subiendo grabación…");
      const ok = await uploadAudio(pid, slot, blob, blob.type);
      if(ok) toast("Audio publicado ✓");
      if(state.view==="persona") renderPersona();
    };
    const t0 = Date.now();
    recState[key] = { rec:rec, t0:t0, timer:setInterval(() => {
      const el = document.getElementById("rectime-" + key);
      if(el) el.textContent = fmtClock(Math.floor((Date.now()-t0)/1000));
    }, 500) };
    rec.start();
    if(state.view==="persona") renderPersona();
  }catch(e){ toast("No se pudo acceder al micrófono; usa “Subir audio”."); }
}

  if(panel.hasAttribute('hidden')){ panel.removeAttribute('hidden'); btn.innerHTML = '📖 Ocultar guion'; btn.classList.add('on'); }
  else { panel.setAttribute('hidden',''); btn.innerHTML = '📖 Ver guion'; btn.classList.remove('on'); }

function buildPresOverlay(){
  const old = document.getElementById('presov'); if(old) old.remove();
  const ov = document.createElement('div'); ov.className = 'pres-overlay'; ov.id = 'presov';
  ov.innerHTML = ''
    + '<div class="pres-top"><div class="who" id="preswho"></div>'
    +   '<button class="btn btn-ghost btn-sm" onclick="presClose()">✕ Salir</button></div>'
    + '<div class="pres-stage"><img id="presimg" alt="diapositiva"></div>'
    + '<div class="pres-bar"><i id="presbar" style="width:0%"></i></div>'
    + '<div class="pres-warn" id="preswarn"></div>'
    + '<div class="pres-ctrls">'
    +   '<button class="btn btn-ghost" onclick="presPrev()">◀ Anterior</button>'
    +   '<button class="btn btn-ghost" id="presplay" onclick="presToggle()">⏸ Pausa</button>'
    +   '<button class="btn btn-ghost" onclick="presNext()">Siguiente ▶</button>'
    + '</div><audio id="presaudio"></audio>';
  document.body.appendChild(ov);
  const a = document.getElementById('presaudio');
  a.addEventListener('ended', presNext);
  a.addEventListener('timeupdate', presTick);
}
function setPresImg(){ const seg = pres.segs[pres.i]; document.getElementById('presimg').src = slides[String(seg.slides[pres.slideIdx])]; }
function showSeg(){
  if(!pres) return;
  if(pres.timer){ clearInterval(pres.timer); pres.timer = null; }
  const seg = pres.segs[pres.i]; pres.slideIdx = 0;
  document.getElementById('preswho').innerHTML = esc(seg.p.nombre) + ' <small>' + esc(seg.p.rol) + ' · diapo ' + seg.slides.join('+') + ' · (' + (pres.i+1) + '/' + pres.segs.length + ')</small>';
  setPresImg();
  document.getElementById('presbar').style.width = '0%';
  const a = document.getElementById('presaudio'), warn = document.getElementById('preswarn');
  if(seg.audio){
    warn.textContent = '';
    a.src = seg.audio.url; if(pres.playing){ a.play().catch(()=>{}); }
  }else{
    a.removeAttribute('src');
    warn.textContent = '— sin audio subido — pulsa “Siguiente”';
    let secs = 0; const per = 9;
    pres.timer = setInterval(() => {
      if(!pres.playing) return; secs++;
      document.getElementById('presbar').style.width = Math.min(100,(secs%per)/per*100) + '%';
      if(secs % per === 0){
        if(pres.slideIdx < seg.slides.length-1){ pres.slideIdx++; setPresImg(); }
        else { presNext(); }
      }
    }, 1000);
  }
}
function presTick(){
  if(!pres) return; const seg = pres.segs[pres.i]; if(!seg.audio) return;
  const a = document.getElementById('presaudio'); if(!a.duration) return;
  const prog = a.currentTime / a.duration;
  document.getElementById('presbar').style.width = (prog*100) + '%';
  if(seg.slides.length > 1){
    const idx = Math.min(seg.slides.length-1, Math.floor(prog * seg.slides.length));
    if(idx !== pres.slideIdx){ pres.slideIdx = idx; setPresImg(); }
  }
}
function presNext(){ if(!pres) return; if(pres.i < pres.segs.length-1){ pres.i++; showSeg(); } else { presClose(); } }
function presPrev(){ if(!pres) return; if(pres.i > 0){ pres.i--; showSeg(); } }
function presToggle(){
  if(!pres) return; pres.playing = !pres.playing;
  document.getElementById('presplay').textContent = pres.playing ? '⏸ Pausa' : '▶ Reanudar';
  const a = document.getElementById('presaudio'), seg = pres.segs[pres.i];
  if(seg.audio){ if(pres.playing) a.play().catch(()=>{}); else a.pause(); }
}
function presClose(){
  const a = document.getElementById('presaudio'); if(a) a.pause();
  if(pres && pres.timer) clearInterval(pres.timer);
  pres = null; const ov = document.getElementById('presov'); if(ov) ov.remove();
}

/* ---- diagnóstico de conexión ---- */
async function checkUrl(url){
  try{
    const r = await fetch(url, { headers: sbHeaders() });
    let msg = ""; if(!r.ok){ try{ msg = await r.text(); }catch(e){} }
    return { ok:r.ok, status:r.status, msg:(msg||"").replace(/\s+/g," ").trim().slice(0,70), reason: r.ok ? "ok" : classifyError(r.status, msg) };
  }catch(e){ return { ok:false, status:0, msg:"sin red / CORS", reason:"net" }; }
}
async function checkBucket(){
  // ruta pública: no depende de permisos sobre storage.buckets. Distingue bucket vs objeto.
  try{
    const r = await fetch(SUPA_URL + "/storage/v1/object/public/" + BUCKET + "/__probe__.txt");
    let msg = ""; try { msg = await r.text(); } catch(e){}
    if(/Bucket not found/i.test(msg)) return { ok:false, status:r.status, msg:"Bucket not found", reason:"bucket" };
    return { ok:true, status:r.status, msg:"existe", reason:"ok" }; // objeto no encontrado = el bucket SÍ existe
  }catch(e){ return { ok:false, status:0, msg:"sin red", reason:"net" }; }
}
async function probarConexion(){
  const old = document.getElementById('diagbg'); if(old) old.remove();
  if(!sbReady()){ openDiag([{ label:"Configuración", ok:false, txt:"No has pegado la URL y la clave en el archivo." }], "noconf"); return; }
  toast("Probando conexión…");
  const t = await checkUrl(SUPA_URL + "/rest/v1/fm_test_resultado?select=id&limit=1");
  const a = await checkUrl(SUPA_URL + "/rest/v1/fm_audio?select=id&limit=1");
  const b = await checkBucket();
  const kind = keyKind();
  const mask = SUPA_KEY.length > 24 ? (SUPA_KEY.slice(0,18) + "…" + SUPA_KEY.slice(-6)) : SUPA_KEY;
  const detail = r => r.ok ? "OK" : ("HTTP " + (r.status||"—") + (r.msg ? " · " + r.msg : ""));
  const rows = [
    { label:"URL del proyecto", ok:true, txt: SUPA_URL.replace("https://","") },
    { label:"Clave", ok:(kind==="publishable"||kind==="jwt-legacy"), txt: kind + " · " + SUPA_KEY.length + " car · " + mask },
    { label:"Tabla fm_test_resultado", ok:t.ok, txt: detail(t) },
    { label:"Tabla fm_audio", ok:a.ok, txt: detail(a) },
    { label:"Bucket fm-audios", ok:b.ok, txt: detail(b) }
  ];
  let verdict = "ok";
  if(kind==="secret" || kind==="desconocida") verdict = "key";
  else if([t,a].some(r => r.reason==="grants")) verdict = "grants";
  else if([t,a,b].some(r => r.reason==="key")) verdict = "key";
  else if(!t.ok || !a.ok) verdict = "tables";
  else if(!b.ok) verdict = "bucket";
  openDiag(rows, verdict);
}
function openDiag(rows, verdict){
  const fixes = {
    ok:    "✅ Todo correcto. Si un audio no aparece al recargar, vuelve a subirlo (ahora sí queda guardado).",
    grants:"🔐 ¡La clave conecta bien! Pero al rol anónimo le faltan permisos sobre las tablas (error 42501). Vuelve a ejecutar en el SQL Editor el <b>festivemetrics_supabase.sql ACTUALIZADO</b> (ahora incluye los <code>GRANT</code>). Luego pulsa «Volver a probar».",
    key:   "🔑 La clave no la acepta el proyecto. Como YA es del tipo <code>sb_publishable_</code>, lo más probable es que esté <b>incompleta</b>: en Supabase → Settings → API Keys, pulsa el icono de <b>copiar</b> (no selecciones el texto, que sale cortado con «…»), pégala entera en <code>SUPA_KEY</code>, <b>guarda</b> y recarga con <b>Ctrl+Shift+R</b>.",
    tables:"🗄️ Faltan las tablas. Abre Supabase → <b>SQL Editor</b> → pega <b>festivemetrics_supabase.sql</b> entero → <b>Run</b>.",
    bucket:"📦 Falta el bucket. Lo más rápido y fiable: Supabase → <b>Storage</b> → <b>New bucket</b> → nombre exacto <code>fm-audios</code> → activa <b>Public bucket</b> → crear. (O re-ejecuta el SQL.)",
    noconf:"⚙️ Pega la URL del proyecto y la Publishable key en las dos líneas del index.html y vuelve a abrirlo."
  };
  const rowHtml = rows.map(r => '<tr><td style="vertical-align:top">' + r.label + '</td>'
    + '<td style="text-align:right;font-size:.82rem;word-break:break-word;' + (r.ok?'color:var(--ok)':'color:var(--bad)') + '">'
    + (r.ok?'✓ ':'✗ ') + esc(r.txt) + '</td></tr>').join('');
  const bg = document.createElement('div'); bg.className = 'modal-bg'; bg.id = 'diagbg';
  bg.onclick = e => { if(e.target === bg) bg.remove(); };
  bg.innerHTML = '<div class="modal">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    +   '<h2 style="font-size:1.3rem">🔌 Probar conexión</h2>'
    +   '<button class="btn btn-ghost btn-sm" onclick="this.closest(\'.modal-bg\').remove()">✕</button></div>'
    + '<table class="tbl">' + rowHtml + '</table>'
    + '<div class="banner ' + (verdict==="ok"?'live':'warn') + '" style="margin-top:14px"><div>' + fixes[verdict] + '</div></div>'
    + '<div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="probarConexion()">↻ Volver a probar</button></div></div>';
  document.body.appendChild(bg);
}

/* ---- guion completo (PDF embebido, render inline con PDF.js, sin descarga) ---- */
function b64ToBytes(b64){
  const bin = atob(b64); const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return arr;
}
let _pdfjs = null;
function loadPdfJs(){
  if(window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  if(_pdfjs) return _pdfjs;
  _pdfjs = new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => { try{ window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; }catch(e){} res(window.pdfjsLib); };
    s.onerror = () => rej(new Error("pdfjs no disponible"));
    document.head.appendChild(s);
  });
  return _pdfjs;
}
async function openGuion(){
  if(!DATA.guionPdf){ toast("Guion no disponible en este archivo."); return; }
  const bg = document.createElement('div'); bg.className = 'modal-bg'; bg.id = 'guionbg';
  bg.onclick = e => { if(e.target === bg) closeGuion(); };
  bg.innerHTML = '<div class="modal" style="max-width:920px;width:96%;height:90vh;padding:0;display:flex;flex-direction:column;overflow:hidden">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);flex:0 0 auto">'
    +   '<b style="font-family:Fraunces,serif;font-size:1.05rem">📄 Guion completo · 10 min</b>'
    +   '<button class="btn btn-ghost btn-sm" onclick="closeGuion()">✕ Cerrar</button></div>'
    + '<div id="guionpages" style="flex:1 1 auto;overflow:auto;background:#E8E0D1;padding:14px;display:flex;flex-direction:column;align-items:center;gap:14px">'
    +   '<p class="muted">Cargando guion…</p></div></div>';
  document.body.appendChild(bg);
  const cont = document.getElementById('guionpages');
  try{
    const lib = await loadPdfJs();
    const pdf = await lib.getDocument({ data: b64ToBytes(DATA.guionPdf) }).promise;
    if(!document.getElementById('guionbg')) return; // cerrado mientras cargaba
    cont.innerHTML = "";
    const dpr = window.devicePixelRatio || 1;
    const targetW = Math.min(840, cont.clientWidth - 8);
    for(let n=1; n<=pdf.numPages; n++){
      const page = await pdf.getPage(n);
      const base = page.getViewport({ scale: 1 });
      const scale = targetW / base.width;
      const vp = page.getViewport({ scale: scale * dpr });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      canvas.style.width = (vp.width / dpr) + "px"; canvas.style.height = "auto";
      canvas.style.borderRadius = "8px"; canvas.style.boxShadow = "0 8px 24px -12px #0007";
      cont.appendChild(canvas);
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    }
  }catch(e){
    // fallback: visor del navegador (por si no hay internet para PDF.js)
    if(!state.guionUrl){ try{ state.guionUrl = URL.createObjectURL(new Blob([b64ToBytes(DATA.guionPdf)], { type:'application/pdf' })); }catch(_){} }
    if(cont) cont.innerHTML = '<iframe title="Guion" src="' + (state.guionUrl||'') + '#toolbar=0" style="width:100%;height:100%;border:0;background:#fff"></iframe>';
  }
}
function closeGuion(){ const m = document.getElementById('guionbg'); if(m) m.remove(); }
